version: '3.9'

services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: nexusiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexusiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: nexusiq_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB
  mongodb:
    image: mongo:7-jammy
    container_name: nexusiq-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: nexusiq
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/nexusiq --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (Node.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusiq-backend
    restart: unless-stopped
    env_file: ./backend/.env.example
    environment:
      NODE_ENV: production
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: nexusiq
      PG_USER: postgres
      PG_PASSWORD: nexusiq_secret
      MONGO_URI: mongodb://mongodb:27017/nexusiq
      AI_SERVICE_URL: http://ai-service:8000
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  # AI Service (Python FastAPI)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: nexusiq-ai
    restart: unless-stopped
    env_file: ./ai-service/.env.example
    environment:
      MONGO_URI: mongodb://mongodb:27017/nexusiq
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./ai-service:/app
      - chroma_data:/app/chroma_db

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusiq-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  mongo_data:
  chroma_data:
